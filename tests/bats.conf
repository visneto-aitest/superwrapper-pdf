# Bats configuration for AI CLI tool tests
#
# Run tests:
#   bats tests/unit/test-common.bats
#   bats tests/unit/test-env.bats
#   bats tests/unit/test-profile.bats
#   bats tests/unit/test-status.bats
#
# Run all:
#   bats tests/unit/
#
# With detailed output:
#   bats --print-output-on-failure tests/unit/
#
# Install bats:
#   brew install bats-core        # macOS
#   sudo apt install bats         # Ubuntu/Debian
#   npm install -g bats           # Node.js
#
# Set SCRIPTS_ROOT before running if scripts are not in ../scripts/
#   export SCRIPTS_ROOT=/path/to/scripts
